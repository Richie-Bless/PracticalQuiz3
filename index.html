<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Solar System</title>
    <script src="script/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
    </style>
    
    <!-- Code for Revolution of Planets -->
    <script>
      AFRAME.registerComponent('orbit', {
        schema: { speed: { type: 'number', default: 10 } },
        tick: function(time, delta) {
          var deg = (this.data.speed * delta) / 1000;
          var rot = this.el.getAttribute('rotation');
          this.el.setAttribute('rotation', { x: rot.x, y: rot.y + deg, z: rot.z });
        }
      });

      
     </script>
  </head>
  <body> 
     <a-scene
      background="color: #00001a"
      renderer="antialias: true; colorManagement: false;"
      vr-mode-ui="enabled: false"
    > 

    

      <a-sky src="texture/2k_stars_milky_way.jpg" radius="500"></a-sky>

      
      <a-entity id="rig" position="-2 24 78" rotation="-16 0 0">
    <a-camera id="cam" fov="66" near="1" far="2400"
      look-controls="pointerLockEnabled:false"
      wasd-controls="acceleration:38">
      <a-cursor
        raycaster="objects:.pk;far:800"
        material="color:#aaccff;shader:flat"
        geometry="primitive:ring;radiusInner:0.012;radiusOuter:0.020"
        animation__h="property:scale;startEvents:mouseenter;to:1.6 1.6 1.6;dur:130"
        animation__l="property:scale;startEvents:mouseleave;to:1 1 1;dur:130">
      </a-cursor>
    </a-camera>
  </a-entity>

      <a-light type="ambient" intensity="3.0" color="#ffffff"></a-light>
      <a-light type="point" position="0 0 0" intensity="1.5" distance="400" color="#fff8e0"></a-light>

      <!-- SUN -->
      <a-sphere src="texture/2k_sun.jpg" position="0 0 0" radius="7"
        material=" shader:flat">
      </a-sphere>

      <!-- ORBIT RINGS -->
      <a-torus position="0 0 0" rotation="-90 0 0" radius="13" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="19" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="26" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="33" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="43" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="55" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="66" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>
      <a-torus position="0 0 0" rotation="-90 0 0" radius="77" tube="0.03" segments-tubular="120" material="color:#white; transparent:true; opacity:0.6; shader:flat"></a-torus>

      <!-- MERCURY r=10 | 72°/s -->
      <a-entity orbit="speed:72">
        <a-sphere src="texture/2k_mercury.jpg" position="13 0 0" radius="1.0" material=" shader:flat" self-spin="speed:5"></a-sphere>
      </a-entity>

      <!-- VENUS r=16 | 45°/s -->
      <a-entity orbit="speed:45">
        <a-sphere src="texture/2k_venus_surface.jpg" position="19 0 0" radius="1.7" material=" shader:flat" self-spin="speed:3"></a-sphere>
        <a-sphere position="19 0 0" radius="1.78" material=" shader:flat; transparent:true; opacity:0.4; side:double" self-spin="speed:1.5"></a-sphere>
      </a-entity>

      <!-- EARTH + MOON r=23 | 30°/s -->
      <a-entity id="earth-pivot" orbit="speed:30">
        <a-sphere src="texture/2k_earth_daymap.jpg" position="26 0 0" radius="1.8" material=" shader:flat" self-spin="speed:10"></a-sphere>
        <a-entity position="26 0 0" orbit="speed:130">
          <a-sphere src="texture/2k_moon.jpg" position="4.0 0 0" radius="0.5" material=" shader:flat" self-spin="speed:4"></a-sphere>
        </a-entity>
      </a-entity>

      <!-- MARS r=30 | 16.4°/s -->
      <a-entity orbit="speed:16.4">
        <a-sphere src="texture/2k_mars.jpg" position="33 0 0" radius="1.3" material=" shader:flat" self-spin="speed:9"></a-sphere>
      </a-entity>

      <!-- JUPITER r=40 | 6°/s -->
      <a-entity orbit="speed:6">
        <a-sphere src="texture/2k_jupiter.jpg" position="43 0 0" radius="3.6" material="shader:flat" self-spin="speed:20"></a-sphere>
      </a-entity>

      <!-- SATURN + RINGS r=52 | 2.4°/s -->
      <a-entity orbit="speed:2.4">
        <a-sphere src="texture/2k_saturn.jpg" position="55 0 0" radius="3.0" material="shader:flat" self-spin="speed:18"></a-sphere>
        <a-torus src="texture/2k_saturn_ring_alpha.png" position="55 0 0" rotation="90 0 0" radius="5.8" tube="1.8" segments-tubular="80" segments-radial="4"
          material="shader:flat; transparent:true; opacity:0.9; side:double; alphaTest:0.05">
        </a-torus>
      </a-entity>

      <!-- URANUS r=63 | 0.86°/s -->
      <a-entity orbit="speed:0.86">
        <a-sphere src="texture/2k_uranus.jpg" position="66 0 0" radius="2.4" material=" shader:flat" self-spin="speed:14"></a-sphere>
      </a-entity>

      <!-- NEPTUNE r=74 | 0.44°/s -->
      <a-entity orbit="speed:0.44">
        <a-sphere src="texture/2k_neptune.jpg" position="77 0 0" radius="2.1" material=" shader:flat" self-spin="speed:12"></a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
